name: Testes API ServeRest com Newman

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  testes-api:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 2. Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 3. Instalar o Newman e o htmlextra
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: 4. Subir o servidor ServeRest localmente
        run: npx serverest &

      - name: 5. Executar a Collection e gerar relatório
        run: |
          mkdir -p newman-relatorios
          newman run collections/sua-collection.json \
            -e serverest_env.postman_environment.json\
            -r htmlextra \
            --reporter-htmlextra-export newman-relatorios/relatorio.html

      - name: 6. Salvar o relatório como artefato
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-htmlextra
          path: newman-relatorios/relatorio.html
